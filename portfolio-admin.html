<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 포트폴리오 관리</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f3f4f6;
        }

        /* Forms / Cards */
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
            border: 1px solid #e5e7eb;
            margin-bottom: 24px;
        }

        /* Checkbox list */
        .tag-list label {
            display: inline-flex;
            align-items: center;
            margin-right: 16px;
            font-size: 14px;
            cursor: pointer;
        }

        .tag-list input {
            accent-color: #6366f1;
            margin-right: 6px;
            width: 16px;
            height: 16px;
        }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>

<body class="text-gray-800 antialiased p-6 md:p-12">

    <!-- 🔒 관리자 로그인 오버레이 -->
    <div id="adminLoginOverlay" class="fixed inset-0 bg-gray-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-8 text-center">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">포트폴리오 관리자 인증</h2>
            <p class="text-gray-500 mb-8 text-sm">대시보드 접속을 위해 비밀번호를 입력하세요.</p>
            <input type="password" id="adminPasswordInput" placeholder="비밀번호 입력"
                class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-center text-lg focus:border-indigo-500 focus:outline-none mb-4 transition-colors">
            <button onclick="checkAdminLogin()"
                class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-indigo-700 transition-all">로그인</button>
            <p id="adminLoginError" class="text-red-500 text-xs mt-4 font-medium hidden">비밀번호가 일치하지 않습니다.</p>
        </div>
    </div>

    <!-- 내용 -->
    <div id="adminContent" class="max-w-6xl mx-auto hidden">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">포트폴리오 관리</h1>
                <p class="text-gray-500 mt-2">새로운 작성 및 삭제가 가능합니다.</p>
            </div>
            <div>
                <a href="/admin1234" class="text-sm font-semibold text-indigo-600 hover:underline">← 문의 관리 대시보드
                    가기</a>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Area (Left) -->
            <div class="lg:col-span-1">
                <div class="card">
                    <h2 class="text-lg font-bold mb-4 border-b pb-2">새 포트폴리오 등록</h2>

                    <form id="portfolioForm" onsubmit="submitForm(event)">
                        <div class="space-y-4">
                            <!-- Title -->
                            <div>
                                <label class="block text-sm font-semibold mb-1">프로젝트명 (Title) <span
                                        class="text-red-500">*</span></label>
                                <input type="text" id="p_title" required
                                    class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="ex) IMPEX GLS 홈페이지 리뉴얼">
                            </div>

                            <!-- Client -->
                            <div>
                                <label class="block text-sm font-semibold mb-1">고객/브랜드명 (Client)</label>
                                <input type="text" id="p_client"
                                    class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="ex) IMPEX GLS">
                            </div>

                            <!-- Desc / Role / Duration -->
                            <div>
                                <label class="block text-sm font-semibold mb-1">수행 내역 요약 (Role/Desc)</label>
                                <input type="text" id="p_role"
                                    class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="ex) UI/UX 리뉴얼 및 1,700개 상품군 SEO 최적화">
                            </div>

                            <div>
                                <label class="block text-sm font-semibold mb-1">상세 설명 한 줄 (Content)</label>
                                <textarea id="p_content1" rows="2"
                                    class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="상세 링크 클릭 시 보이는 설명문"></textarea>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-sm font-semibold mb-1">제작 기간 (Duration)</label>
                                    <input type="text" id="p_duration"
                                        class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                        placeholder="ex) 1~3개월">
                                </div>
                            </div>

                            <!-- Tags Checkbox -->
                            <div>
                                <label class="block text-sm font-semibold mb-1">카테고리 태그 (Tags)</label>
                                <div class="tag-list bg-gray-50 border rounded-lg p-3">
                                    <label><input type="checkbox" value="b2b" class="tag-check"> B2B SOLUTION</label>
                                    <label><input type="checkbox" value="b2c" class="tag-check"> B2C & COMMERCE</label>
                                    <label><input type="checkbox" value="renewal" class="tag-check"> RENEWAL</label>
                                </div>
                            </div>

                            <!-- Thumbnails & Visuals -->
                            <hr class="my-4">
                            <div>
                                <label class="block text-sm font-semibold mb-1">썸네일 이미지 주소 (Thumbnail) <span
                                        class="text-xs text-gray-500 font-normal ml-2">가장 권장하는 비율은 4:3 입니다.</span> <span
                                        class="text-red-500">*</span></label>
                                <input type="url" id="p_thumb" required
                                    class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="https://...">
                            </div>

                            <div>
                                <label class="block text-sm font-semibold mb-1">대표 배너 이미지 주소 (Visual Hero) <span
                                        class="text-xs text-gray-500 font-normal ml-2">가로로 긴 PC 해상도용 이미지</span></label>
                                <input type="url" id="p_visual"
                                    class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="https://...">
                            </div>

                            <div>
                                <label class="block text-sm font-semibold mb-1">상세 이미지 1 주소</label>
                                <input type="url" id="p_img1"
                                    class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="https://...">
                            </div>

                            <div>
                                <label class="block text-sm font-semibold mb-1">상세 이미지 2 주소</label>
                                <input type="url" id="p_img2"
                                    class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                                    placeholder="https://...">
                            </div>

                            <button type="submit" id="submitBtn"
                                class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-indigo-700 transition-all mt-4">새
                                포트폴리오 등록하기</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- List Area (Right) -->
            <div class="lg:col-span-2">
                <div class="card overflow-hidden">
                    <h2 class="text-lg font-bold mb-4 border-b pb-2">등록된 포트폴리오 <span id="listCount"
                            class="text-indigo-600 ml-2">0</span></h2>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th
                                        class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                        포트폴리오 정보</th>
                                    <th
                                        class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                        태그</th>
                                    <th
                                        class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                        괸리</th>
                                </tr>
                            </thead>
                            <tbody id="portfolioList" class="bg-white divide-y divide-gray-200">
                                <!-- JS Injected Content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 🚀 자동 데이터 세팅 (AI 추천) -->
        <div class="card mt-8 border-indigo-200 bg-indigo-50/30">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-bold text-indigo-900">데이터베이스 초기화 및 자동 업로드</h2>
                    <p class="text-sm text-indigo-700 mt-1">기존의 구버전 데이터를 모두 삭제하고, 승인된 7개의 새로운 포트폴리오를 등록합니다.</p>
                </div>
                <button onclick="resetAndSeedData()" id="seedBtn"
                    class="bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all flex items-center gap-2">
                    <span>데이터 초기화 및 업로드 실행</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ✏️ 수정 모달 (Edit Modal) -->
    <div id="editModal" class="fixed inset-0 bg-black/50 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">포트폴리오 수정</h2>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <form id="editForm" onsubmit="updatePortfolio(event)">
                <input type="hidden" id="edit_id">
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">프로젝트명</label>
                            <input type="text" id="edit_title" required class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">고객/브랜드명</label>
                            <input type="text" id="edit_client" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">수행 내역 요약</label>
                        <input type="text" id="edit_role" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">상세 설명 한 줄</label>
                        <textarea id="edit_content1" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">제작 기간</label>
                            <input type="text" id="edit_duration" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">카테고리 태그</label>
                            <div class="flex gap-2 mt-1">
                                <label class="inline-flex items-center text-xs"><input type="checkbox" value="b2b" class="edit-tag-check mr-1"> B2B</label>
                                <label class="inline-flex items-center text-xs"><input type="checkbox" value="b2c" class="edit-tag-check mr-1"> B2C</label>
                                <label class="inline-flex items-center text-xs"><input type="checkbox" value="renewal" class="edit-tag-check mr-1"> RENEWAL</label>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">썸네일 URL</label>
                            <input type="url" id="edit_thumb" required class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">대표 배너 URL</label>
                            <input type="url" id="edit_visual" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1">상세 이미지 1 URL</label>
                            <input type="url" id="edit_img1" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">상세 이미지 2 URL</label>
                            <input type="url" id="edit_img2" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-100 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-200 transition-all">취소</button>
                        <button type="submit" id="updateBtn" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all">변경사항 저장</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDJeGRV5CnRoRwqoQ1igrjhHCJHCMow3L4",
            authDomain: "sketchoo-2c343.firebaseapp.com",
            projectId: "sketchoo-2c343",
            storageBucket: "sketchoo-2c343.firebasestorage.app",
            messagingSenderId: "1072809023897",
            appId: "1:1072809023897:web:edc12722ad0d03b4a45b08"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🛡️ 로그인 로직
        const ADMIN_PASS = "admin1234";

        function checkAdminLogin() {
            const input = document.getElementById('adminPasswordInput').value;
            if (input === ADMIN_PASS) {
                sessionStorage.setItem('admin_auth_pf', 'true');
                document.getElementById('adminLoginOverlay').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                loadList();
            } else {
                document.getElementById('adminLoginError').classList.remove('hidden');
            }
        }

        document.getElementById('adminPasswordInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAdminLogin();
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('admin_auth_pf') === 'true') {
                document.getElementById('adminLoginOverlay').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                loadList();
            }
        });

        // 📝 폼 제출
        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = "저장 중...";

            const selectedTags = Array.from(document.querySelectorAll('.tag-check:checked')).map(cb => cb.value);

            // DB에 저장할 데이터 구성
            const data = {
                title: document.getElementById('p_title').value,
                client: document.getElementById('p_client').value,
                role: document.getElementById('p_role').value,
                content1: document.getElementById('p_content1').value,
                desc: document.getElementById('p_role').value, // desc = role 로 통일
                duration: document.getElementById('p_duration').value,
                thumb: document.getElementById('p_thumb').value,
                visual: document.getElementById('p_visual').value,
                img1: document.getElementById('p_img1').value,
                img2: document.getElementById('p_img2').value,
                tags: selectedTags,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("portfolios").add(data);

                alert("성공적으로 등록되었습니다!");
                document.getElementById('portfolioForm').reset();
                loadList();

            } catch (error) {
                console.error(error);
                alert("등록 중 오류가 발생했습니다: " + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "새 포트폴리오 등록하기";
            }
        }

        // 📊 리스트 불러오기
        async function loadList() {
            const listEl = document.getElementById('portfolioList');
            const cntEl = document.getElementById('listCount');
            listEl.innerHTML = `<tr><td colspan="3" class="text-center py-8 text-gray-500">불러오는 중...</td></tr>`;

            try {
                const snapshot = await db.collection("portfolios").orderBy("createdAt", "desc").get();
                cntEl.textContent = snapshot.docs.length;
                listEl.innerHTML = '';

                if (snapshot.empty) {
                    listEl.innerHTML = `<tr><td colspan="3" class="text-center py-8 text-gray-500">등록된 항목이 없습니다.</td></tr>`;
                    return;
                }

                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const tr = document.createElement('tr');

                    tr.innerHTML = `
                        <td class="px-4 py-4">
                            <div class="flex items-center gap-4">
                                ${data.thumb ? `<img src="${data.thumb}" class="w-16 h-12 object-cover rounded-md border">` : '<div class="w-16 h-12 bg-gray-200 rounded-md border"></div>'}
                                <div>
                                    <p class="font-bold text-gray-900">${data.title}</p>
                                    <p class="text-[10px] text-indigo-500 font-mono mt-0.5 break-all">${data.thumb || 'No Path'}</p>
                                    <p class="text-xs text-gray-500 mt-1">${data.client || '-'} | ${data.role || '-'}</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-4 py-4">
                            <div class="flex flex-wrap gap-1">
                                ${(data.tags || []).map(t => `<span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-1 rounded border border-indigo-100 uppercase">${t}</span>`).join('')}
                            </div>
                        </td>
                        <td class="px-4 py-4 text-right">
                            <div class="flex justify-end gap-2">
                                <button onclick="openEditModal('${doc.id}')" class="text-indigo-600 hover:text-white hover:bg-indigo-600 border border-indigo-600 px-3 py-1 rounded-md text-sm font-semibold transition-colors">수정</button>
                                <button onclick="deleteItem('${doc.id}')" class="text-red-500 hover:text-white hover:bg-red-500 border border-red-500 px-3 py-1 rounded-md text-sm font-semibold transition-colors">삭제</button>
                            </div>
                        </td>
                    `;
                    listEl.appendChild(tr);
                });
            } catch (e) {
                listEl.innerHTML = `<tr><td colspan="3" class="text-center py-8 text-red-500">데이터를 불러오지 못했습니다.</td></tr>`;
            }
        }

        // 🗑️ 삭제 로직
        async function deleteItem(id) {
            if (!confirm("정말 이 포트폴리오를 삭제하시겠습니까?")) return;
            try {
                await db.collection("portfolios").doc(id).delete();
                loadList();
            } catch (e) {
                alert("삭제 중 오류가 발생했습니다.");
            }
        }

        // ✏️ 수정 모달 열기
        async function openEditModal(id) {
            try {
                const doc = await db.collection("portfolios").doc(id).get();
                if (!doc.exists) return;
                const data = doc.data();

                document.getElementById('edit_id').value = id;
                document.getElementById('edit_title').value = data.title || '';
                document.getElementById('edit_client').value = data.client || '';
                document.getElementById('edit_role').value = data.role || '';
                document.getElementById('edit_content1').value = data.content1 || '';
                document.getElementById('edit_duration').value = data.duration || '';
                document.getElementById('edit_thumb').value = data.thumb || '';
                document.getElementById('edit_visual').value = data.visual || '';
                document.getElementById('edit_img1').value = data.img1 || '';
                document.getElementById('edit_img2').value = data.img2 || '';

                // 태그 체크
                const tags = data.tags || [];
                document.querySelectorAll('.edit-tag-check').forEach(cb => {
                    cb.checked = tags.includes(cb.value);
                });

                document.getElementById('editModal').classList.remove('hidden');
            } catch (e) {
                alert("데이터를 가져오는 중 오류가 발생했습니다.");
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        // ✏️ 수정 업데이트 저장
        async function updatePortfolio(e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.textContent = "저장 중...";

        window.addEventListener('load', function() {
            function sendHeight() {
                const height = document.documentElement.scrollHeight || document.body.scrollHeight;
                window.parent.postMessage({ type: 'resize', height: height }, '*');
            }
            sendHeight();
            window.addEventListener('resize', sendHeight);
            const observer = new MutationObserver(sendHeight);
            observer.observe(document.body, { childList: true, subtree: true });
        });
