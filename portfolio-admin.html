<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKETCH OO 포트폴리오 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: #1e293b; border: 1px solid #334155; color: white; padding: 0.75rem; border-radius: 0.5rem; width: 100%; transition: all 0.3s; }
        .input-field:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%); transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .checkbox-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; background: #1e293b; padding: 1rem; border-radius: 0.5rem; border: 1px solid #334155; }
        .checkbox-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #94a3b8; cursor: pointer; }
        .checkbox-item input { accent-color: #38bdf8; cursor: pointer; }
        .checkbox-item:hover { color: #f1f5f9; }
        #adminContent { display: none; }
        #loginOverlay { display: flex; }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- 🔐 로그인 섹션 -->
    <div id="loginOverlay" class="fixed inset-0 bg-[#0f172a] z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl text-center">
            <h2 class="text-2xl font-bold text-slate-900 mb-2">포트폴리오 관리자 인증</h2>
            <p class="text-slate-500 mb-6 text-sm">대시보드 접속을 위해 비밀번호를 입력하세요.</p>
            <input type="password" id="adminPassword" class="w-full p-4 bg-slate-100 border border-slate-200 rounded-xl mb-4 text-center text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••">
            <button onclick="checkPassword()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-all shadow-lg shadow-indigo-200">로그인</button>
        </div>
    </div>

    <!-- 📊 관리자 메인 콘텐츠 (로그인 성공 시 노출) -->
    <div id="adminContent" class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white mb-2">Portfolio Manager</h1>
                <p class="text-slate-400">포트폴리오 데이터베이스 관리 및 프로젝트 등록</p>
            </div>
            <a href="./admin.html" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm transition flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> 관리자 메인으로
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 폼 섹션 -->
            <div class="lg:col-span-1">
                <form id="portfolioForm" class="glass p-6 rounded-2xl space-y-4 sticky top-8">
                    <h2 class="text-xl font-semibold mb-4 text-sky-400 flex items-center gap-2">
                        <i class="fas fa-plus-circle"></i> 신규 프로젝트 등록
                    </h2>
                    
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">프로젝트 제목</label>
                        <input type="text" id="p_title" class="input-field" placeholder="예: IMPEX GLS 글로벌 물류 솔루션" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">클라이언트</label>
                        <input type="text" id="p_client" class="input-field" placeholder="예: IMPEX GLS" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">한줄 설명 (Role)</label>
                        <input type="text" id="p_role" class="input-field" placeholder="예: 글로벌 공급망 관리 UI/UX 리뉴얼" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">리포트용 상세 설명</label>
                        <textarea id="p_content1" class="input-field h-24" placeholder="작업 리포트 상단에 들어갈 기획 의도 및 상세 내용"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">작업 기간</label>
                        <input type="text" id="p_duration" class="input-field" placeholder="예: 2개월">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">태그 (쉼표 구분)</label>
                        <div class="flex gap-4 mt-1 bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" name="tag" value="b2b" class="accent-sky-500"> B2B</label>
                            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" name="tag" value="b2c" class="accent-sky-500"> B2C</label>
                            <label class="flex items-center gap-2 text-sm cursor-pointer"><input type="checkbox" name="tag" value="renewal" class="accent-sky-500"> 리뉴얼</label>
                        </div>
                    </div>

                    <!-- 🚀 제공 서비스 체크박스 그룹 -->
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">제공 서비스 (선택)</label>
                        <div class="checkbox-container text-xs" id="svc_checkboxes">
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="홈페이지 기획"> 홈페이지 기획</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="웹디자인"> 웹디자인</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="통합 관리자페이지 제공"> 통합 관리자페이지</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="모바일 최적화"> 모바일 최적화</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="반응형 웹"> 반응형 웹</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="검색엔진최적화 (SEO)"> 검색엔진최적화</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="스톡 동영상·이미지 제공"> 스톡 영상·이미지</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="HTML"> HTML</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="CSS"> CSS</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="Javascript"> Javascript</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="게시판 세팅"> 게시판 세팅</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="사이트 관리 가이드 제공"> 관리 가이드</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="파비콘 제작"> 파비콘 제작</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="섬네일 제작"> 섬네일 제작</label>
                            <label class="checkbox-item"><input type="checkbox" class="svc-check" value="네이버·구글 사이트 등록"> 검색 포털 등록</label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">작업 리포트 리스트 (자동 노출용)</label>
                        <div class="checkbox-container text-xs">
                            <label class="checkbox-item"><input type="checkbox" class="report-check" data-title="맞춤형 UI/UX 설계" data-desc="사용자 동선과 비즈니스 목표를 고려하여 직관적이고 세련된 인터페이스를 기획 및 디자인합니다."> 맞춤형 UI/UX</label>
                            <label class="checkbox-item"><input type="checkbox" class="report-check" data-title="반응형 웹 퍼블리싱" data-desc="PC, 태블릿, 모바일 등 다양한 디바이스 환경에 최적화된 맞춤형 화면을 제공합니다."> 반응형 웹 퍼블리싱</label>
                            <label class="checkbox-item"><input type="checkbox" class="report-check" data-title="프리미엄 미디어 소스" data-desc="저작권 문제가 없는 고해상도 스톡 이미지와 영상을 활용하여 시각적 완성도를 높입니다."> 프리미엄 미디어</label>
                            <label class="checkbox-item"><input type="checkbox" class="report-check" data-title="검색엔진 최적화 (SEO)" data-desc="포털 사이트 검색 시 상위에 노출될 수 있도록 메타태그 및 구조적 최적화 작업을 진행합니다."> 검색엔진 최적화</label>
                            <label class="checkbox-item"><input type="checkbox" class="report-check" data-title="스마트 폼 연동" data-desc="견적 문의, 상담 신청 등의 데이터를 관리자가 실시간 알림으로 받아볼 수 있도록 폼을 연동합니다."> 스마트 폼 연동</label>
                            <label class="checkbox-item"><input type="checkbox" class="report-check" data-title="관리자 시스템 구축" data-desc="전문 지식 없이도 홈페이지 텍스트 및 이미지를 손쉽게 수정하고 관리할 수 있도록 세팅합니다."> 관리자 시스템</label>
                            <label class="checkbox-item"><input type="checkbox" class="report-check" data-title="웹 접근성 및 보안" data-desc="웹 표준을 준수하고 SSL 보안 인증서 연동을 통해 안전하고 신뢰할 수 있는 사이트를 구축합니다."> 보안 및 인증서</label>
                            <label class="checkbox-item"><input type="checkbox" class="report-check" data-title="인터랙션 코딩" data-desc="동적인 애니메이션과 스크롤 효과를 적용하여 사용자에게 생동감 있는 웹 경험을 선사합니다."> 인터랙션 코딩</label>
                            <label class="checkbox-item"><input type="checkbox" class="report-check" data-title="API 및 외부 연동" data-desc="지도, 소셜 로그인, 외부 모듈 등 다양한 기능을 웹사이트에 매끄럽게 연결합니다."> API 외부 연동</label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-300">실제 사이트 주소 (Link)</label>
                        <input type="text" id="p_link" class="input-field" placeholder="예: https://example.com">
                    </div>

                    <div class="space-y-4 border-t border-slate-700 pt-4 mt-4">
                        <label class="block text-sm font-medium text-slate-300">이미지 경로 (URL)</label>
                        <input type="text" id="p_thumb" class="input-field text-xs" placeholder="썸네일 이미지">
                        <input type="text" id="p_visual" class="input-field text-xs" placeholder="메인 비주얼 이미지">
                        <input type="text" id="p_img1" class="input-field text-xs" placeholder="상세 이미지 1 (Long Scroll)">
                        <input type="text" id="p_img2" class="input-field text-xs" placeholder="상세 이미지 2">
                    </div>

                    <button type="submit" class="w-full py-3 rounded-xl font-bold text-white btn-primary shadow-lg shadow-sky-500/20">
                        저장하기
                    </button>
                    
                    <button type="button" id="seedBtn" onclick="resetAndSeedData()" class="w-full py-2 rounded-xl mt-4 border border-rose-500 text-rose-500 hover:bg-rose-500 hover:text-white transition-all font-semibold text-sm">
                        [데이터 초기화 및 업로드 실행]
                    </button>
                    <p class="text-[10px] text-center text-slate-500 mt-1 mb-4">※ 클릭 시 모든 데이터를 삭제하고 고퀄리티 업종별 데이터로 재설정합니다.</p>

                    <button type="button" id="updateReportsBtn" onclick="updateExistingReports()" class="w-full py-2 rounded-xl border border-teal-400 text-teal-400 hover:bg-teal-400 hover:text-slate-900 transition-all font-bold text-sm shadow-[0_0_15px_rgba(45,212,191,0.2)]">
                        ✨ 기존 포트폴리오 작업리포트 자동 생성
                    </button>
                    <p class="text-[10px] text-center text-teal-500/70 mt-1">※ 기존 이미지는 유지한 채 비어있는 작업 리포트 문구만 채워넣습니다.</p>
                </form>
            </div>

            <!-- 목록 섹션 -->
            <div class="lg:col-span-2 space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xl font-semibold flex items-center gap-2"><i class="fas fa-list"></i> 프로젝트 목록</h2>
                    <span id="pCount" class="text-xs bg-sky-500 text-white px-2 py-1 rounded-full">0건</span>
                </div>
                <div id="portfolioList" class="space-y-4">
                    <!-- 목록 데이터가 여기에 렌더링됨 -->
                    <div class="animate-pulse flex space-x-4 glass p-8 rounded-2xl">
                        <div class="rounded-full bg-slate-700 h-10 w-10"></div>
                        <div class="flex-1 space-y-6 py-1">
                            <div class="h-2 bg-slate-700 rounded"></div>
                            <div class="space-y-3">
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="h-2 bg-slate-700 rounded col-span-2"></div>
                                    <div class="h-2 bg-slate-700 rounded col-span-1"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="editModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="glass w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-3xl p-8 relative shadow-2xl">
            <button onclick="closeEditModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white transition">
                <i class="fas fa-times text-2xl"></i>
            </button>
            <h2 class="text-2xl font-bold mb-6 text-sky-400">프로젝트 수정</h2>
            <form id="editForm" onsubmit="updatePortfolio(event)" class="space-y-6">
                <input type="hidden" id="edit_id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">제목</label>
                        <input type="text" id="edit_title" class="input-field" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">클라이언트</label>
                        <input type="text" id="edit_client" class="input-field" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">한줄 설명 (Role)</label>
                    <input type="text" id="edit_role" class="input-field" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">리포트 상세 설명</label>
                    <textarea id="edit_content1" class="input-field h-32"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">태그</label>
                        <div class="flex gap-4 bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                            <label class="flex items-center gap-2 text-sm"><input type="checkbox" value="b2b" class="edit-tag-check accent-sky-500"> B2B</label>
                            <label class="flex items-center gap-2 text-sm"><input type="checkbox" value="b2c" class="edit-tag-check accent-sky-500"> B2C</label>
                            <label class="flex items-center gap-2 text-sm"><input type="checkbox" value="renewal" class="edit-tag-check accent-sky-500"> 리뉴얼</label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">작업 기간</label>
                        <input type="text" id="edit_duration" class="input-field">
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">제공 서비스</label>
                    <div class="checkbox-container text-xs" id="edit_svc_checkboxes">
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="홈페이지 기획"> 홈페이지 기획</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="웹디자인"> 웹디자인</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="통합 관리자페이지 제공"> 통합 관리자페이지</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="모바일 최적화"> 모바일 최적화</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="반응형 웹"> 반응형 웹</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="검색엔진최적화 (SEO)"> 검색엔진최적화</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="스톡 동영상·이미지 제공"> 스톡 영상·이미지</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="HTML"> HTML</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="CSS"> CSS</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="Javascript"> Javascript</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="게시판 세팅"> 게시판 세팅</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="사이트 관리 가이드 제공"> 관리 가이드</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="파비콘 제작"> 파비콘 제작</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="섬네일 제작"> 섬네일 제작</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-svc-check" value="네이버·구글 사이트 등록"> 검색 포털 등록</label>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">작업 리포트 리스트</label>
                    <div class="checkbox-container text-xs">
                        <label class="checkbox-item"><input type="checkbox" class="edit-report-check" data-title="맞춤형 UI/UX 설계" data-desc="사용자 동선과 비즈니스 목표를 고려하여 직관적이고 세련된 인터페이스를 기획 및 디자인합니다."> 맞춤형 UI/UX</label>
                        <label class="checkbox-item"><input type="checkbox" class="edit-report-check" data-title="반응형 웹 퍼블리싱" data-desc="PC, 태블릿, 모바일 등 다양한 디바이스 환경에 최적화된 맞춤형 화면을 제공합니다."> 반응형 퍼블리싱</label>

                        <label class="checkbox-item"><input type="checkbox" class="edit-report-check" data-title="웹 접근성 및 보안" data-desc="웹 표준을 준수하고 SSL 보안 인증서 연동을 통해 안전하고 신뢰할 수 있는 사이트를 구축합니다."> 보안 및 인증서</label>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">실제 사이트 주소</label>
                    <input type="text" id="edit_link" class="input-field">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="edit_thumb" class="input-field text-xs" placeholder="썸네일">
                    <input type="text" id="edit_visual" class="input-field text-xs" placeholder="비주얼">
                    <input type="text" id="edit_img1" class="input-field text-xs" placeholder="상세 1">
                    <input type="text" id="edit_img2" class="input-field text-xs" placeholder="상세 2">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJeGRV5CnRoRwqoQ1igrjhHCJHCMow3L4",
            authDomain: "sketchoo-2c343.firebaseapp.com",
            projectId: "sketchoo-2c343",
            storageBucket: "sketchoo-2c343.firebasestorage.app",
            messagingSenderId: "1072809023897",
            appId: "1:1072809023897:web:edc12722ad0d03b4a45b08"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 🔐 비밀번호 체크
        function checkPassword() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === '123123' || pass === 'oo123' || pass === 'admin1234') { // 기존 비밀번호 유지 + 새로운 비밀번호 추가
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadList();
            } else {
                alert('비밀번호가 틀렸습니다!');
            }
        }

        // 📋 목록 로드
        async function loadList() {
            const listDiv = document.getElementById('portfolioList');
            const countSpan = document.getElementById('pCount');
            
            try {
                const snapshot = await db.collection("portfolios").orderBy("createdAt", "desc").get();
                listDiv.innerHTML = '';
                countSpan.textContent = snapshot.docs.length + '건';
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const card = `
                        <div class="glass p-6 rounded-2xl flex flex-col md:flex-row gap-6 items-start hover:border-sky-500/50 transition border border-transparent">
                            <div class="w-full md:w-48 aspect-video bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
                                <img src="${data.thumb}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x225?text=No+Image'">
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="text-xl font-bold text-white">${data.title}</h3>
                                    <div class="flex gap-2">
                                        <button onclick="editPortfolio('${doc.id}')" class="text-xs px-3 py-1 bg-sky-500/10 text-sky-400 rounded-full border border-sky-500/20 hover:bg-sky-500 hover:text-white transition">수정</button>
                                        <button onclick="deletePortfolio('${doc.id}')" class="text-xs px-3 py-1 bg-rose-500/10 text-rose-400 rounded-full border border-rose-500/20 hover:bg-rose-500 hover:text-white transition">삭제</button>
                                    </div>
                                </div>
                                <p class="text-sm text-slate-400 mb-3">${data.role}</p>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${data.tags ? data.tags.map(t => `<span class="bg-slate-700 text-slate-300 text-[10px] px-2 py-0.5 rounded uppercase font-bold tracking-tighter">${t}</span>`).join('') : ''}
                                </div>
                                <div class="text-[10px] text-slate-500 flex gap-4">
                                    <span><i class="far fa-user mr-1"></i>${data.client}</span>
                                    <span><i class="far fa-clock mr-1"></i>${data.duration}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    listDiv.innerHTML += card;
                });
            } catch (e) {
                console.error(e);
            }
        }

        // ➕ 신규 등록
        document.getElementById('portfolioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = "저장 중...";

            const selectedTags = Array.from(document.querySelectorAll('input[name="tag"]:checked')).map(cb => cb.value);
            const selectedServices = Array.from(document.querySelectorAll('.svc-check:checked')).map(cb => cb.value).join(', ');
            
            const report_items = Array.from(document.querySelectorAll('.report-check:checked')).map(cb => ({
                title: cb.dataset.title,
                desc: cb.dataset.desc
            }));

            const data = {
                title: document.getElementById('p_title').value,
                client: document.getElementById('p_client').value,
                role: document.getElementById('p_role').value,
                content1: document.getElementById('p_content1').value,
                desc: document.getElementById('p_role').value,
                duration: document.getElementById('p_duration').value,
                link: document.getElementById('p_link').value || '',
                thumb: document.getElementById('p_thumb').value,
                visual: document.getElementById('p_visual').value,
                img1: document.getElementById('p_img1').value,
                img2: document.getElementById('p_img2').value,
                tags: selectedTags,
                services: selectedServices,
                report_items: report_items,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("portfolios").add(data);
                alert("성공적으로 등록되었습니다!");
                e.target.reset();
                loadList();
            } catch (e) {
                alert("등록 중 오류 발생: " + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "저장하기";
            }
        });

        // 🗑️ 삭제
        async function deletePortfolio(id) {
            if (!confirm("정말 삭제하시겠습니까?")) return;
            try {
                await db.collection("portfolios").doc(id).delete();
                loadList();
            } catch (e) { alert("삭제 실패"); }
        }

        // ✏️ 수정 모달 열기
        async function editPortfolio(id) {
            try {
                const doc = await db.collection("portfolios").doc(id).get();
                const data = doc.data();
                
                document.getElementById('edit_id').value = id;
                document.getElementById('edit_title').value = data.title;
                document.getElementById('edit_client').value = data.client;
                document.getElementById('edit_role').value = data.role;
                document.getElementById('edit_content1').value = data.content1 || '';
                document.getElementById('edit_duration').value = data.duration;
                document.getElementById('edit_link').value = data.link || '';
                document.getElementById('edit_thumb').value = data.thumb;
                document.getElementById('edit_visual').value = data.visual;
                document.getElementById('edit_img1').value = data.img1;
                document.getElementById('edit_img2').value = data.img2;

                // 태그 체크
                document.querySelectorAll('.edit-tag-check').forEach(cb => {
                    cb.checked = data.tags && data.tags.includes(cb.value);
                });

                // 서비스 체크
                const existingServices = data.services ? data.services.split(', ') : [];
                document.querySelectorAll('.edit-svc-check').forEach(cb => {
                    cb.checked = existingServices.includes(cb.value);
                });

                // 작업 리포트 체크
                document.querySelectorAll('.edit-report-check').forEach(cb => cb.checked = false);
                if (data.report_items && Array.isArray(data.report_items)) {
                    data.report_items.forEach(item => {
                        const cb = document.querySelector(`.edit-report-check[data-title="${item.title}"]`);
                        if (cb) cb.checked = true;
                    });
                }

                document.getElementById('editModal').classList.remove('hidden');
            } catch (e) {
                alert("데이터를 가져오는 중 오류가 발생했습니다.");
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        // ✏️ 수정 업데이트 저장
        async function updatePortfolio(e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.textContent = "저장 중...";

            const selectedTags = Array.from(document.querySelectorAll('.edit-tag-check:checked')).map(cb => cb.value);
            const selectedServices = Array.from(document.querySelectorAll('.edit-svc-check:checked')).map(cb => cb.value).join(', ');
            
            const report_items = Array.from(document.querySelectorAll('.edit-report-check:checked')).map(cb => ({
                title: cb.dataset.title,
                desc: cb.dataset.desc
            }));

            const data = {
                title: document.getElementById('edit_title').value,
                client: document.getElementById('edit_client').value,
                role: document.getElementById('edit_role').value,
                content1: document.getElementById('edit_content1').value,
                desc: document.getElementById('edit_role').value,
                duration: document.getElementById('edit_duration').value,
                link: document.getElementById('edit_link').value || '',
                thumb: document.getElementById('edit_thumb').value,
                visual: document.getElementById('edit_visual').value,
                img1: document.getElementById('edit_img1').value,
                img2: document.getElementById('edit_img2').value,
                tags: selectedTags,
                services: selectedServices,
                report_items: report_items,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("portfolios").doc(id).update(data);
                alert("성공적으로 수정되었습니다!");
                closeEditModal();
                loadList();
            } catch (e) {
                alert("수정 중 오류가 발생했습니다: " + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "변경사항 저장";
            }
        }
