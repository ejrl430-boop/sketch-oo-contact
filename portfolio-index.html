<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKETCH OO - PORTFOLIO</title>

    <!-- Fonts -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (for layout utilities) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#ccff00',
                        bgDark: '#080808',
                        lineColor: 'rgba(255, 255, 255, 0.15)',
                    },
                    fontFamily: {
                        pretendard: ['Pretendard', 'sans-serif'],
                        mont: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>

    <style>
        :root {
            --neon-color: #ccff00;
            --bg-dark: #080808;
            --line-color: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
            /* Custom cursor */
        }

        body,
        html {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        img {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .font-mont {
            font-family: 'Montserrat', sans-serif !important;
        }

        .font-pretendard {
            font-family: 'Pretendard', sans-serif !important;
        }

        /* Noise Overlay for Texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.05;
            z-index: 9999;
            pointer-events: none;
        }

        /* Custom Cursor */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background-color: var(--neon-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 2147483647;
            pointer-events: none;
            mix-blend-mode: difference;
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease;
        }

        body.is-menu-open #custom-cursor {
            mix-blend-mode: normal !important;
            background-color: var(--neon-color) !important;
        }

        .hover-target {
            cursor: pointer;
        }

        /* ==================== 0. GNB ==================== */
        .gnb-header {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 80px !important;
            min-height: 80px !important;
            padding: 0 !important;
            margin: 0 !important;
            box-sizing: border-box !important;
            z-index: 2147483646 !important;
            display: block !important;
            visibility: visible !important;
            transition: background-color 0.3s ease, border-bottom 0.3s ease, backdrop-filter 0.3s ease !important;
            background-color: transparent;
            border-bottom: 1px solid transparent;
        }

        .gnb-header.scrolled {
            background: rgba(8, 8, 8, 0.95) !important;
            backdrop-filter: blur(15px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .gnb-inner {
            position: relative !important;
            width: 100% !important;
            max-width: 1400px !important;
            height: 80px !important;
            margin: 0 auto !important;
            padding: 0 !important;
            box-sizing: border-box !important;
            display: block !important;
        }

        .gnb-logo {
            position: absolute !important;
            left: 5vw !important;
            top: 25px !important;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(20px, 2.5vw, 24px) !important;
            font-weight: 900 !important;
            color: #fff !important;
            letter-spacing: -1px !important;
            cursor: pointer;
            text-decoration: none !important;
            margin: 0 !important;
            padding: 0 !important;
            line-height: 1 !important;
            display: block !important;
        }

        .gnb-nav {
            position: absolute !important;
            right: 5vw !important;
            top: 15px !important;
            display: block !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .hamburger-btn {
            width: 48px !important;
            height: 48px !important;
            margin: 0 !important;
            padding: 0 !important;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: flex-end !important;
            gap: 8px !important;
            cursor: pointer;
        }

        .hamburger-btn .line {
            background: #fff;
            height: 2px !important;
            transition: all 0.3s ease;
            margin: 0 !important;
            padding: 0 !important;
            display: block !important;
        }

        .hamburger-btn .line:nth-child(1) {
            width: 30px !important;
        }

        .hamburger-btn .line:nth-child(2) {
            width: 20px !important;
        }

        .hamburger-btn:hover .line {
            background: var(--neon-color);
        }

        .hamburger-btn:hover .line:nth-child(2) {
            width: 30px !important;
        }

        .hamburger-btn.is-active .line:nth-child(1) {
            transform: translateY(5px) rotate(45deg);
            width: 30px !important;
            background: var(--neon-color);
        }

        .hamburger-btn.is-active .line:nth-child(2) {
            transform: translateY(-5px) rotate(-45deg);
            width: 30px !important;
            background: var(--neon-color);
        }

        /* 풀스크린 메뉴 */
        #so-overlay-menu {
            position: fixed !important;
            top: -150vh !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background: rgba(8, 8, 8, 0.98) !important;
            z-index: 2147483000 !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
            transition: opacity 0.4s ease, visibility 0.4s ease, top 0s 0.4s !important;
        }

        #so-overlay-menu.active {
            top: 0 !important;
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
            transition: opacity 0.4s ease, visibility 0.4s ease, top 0s 0s !important;
        }

        .overlay-bg-text {
            font-family: 'Montserrat', sans-serif;
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            font-size: clamp(80px, 15vw, 250px) !important;
            font-weight: 900 !important;
            color: transparent !important;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.05) !important;
            z-index: 1 !important;
            pointer-events: none !important;
            letter-spacing: -0.05em !important;
            text-transform: uppercase !important;
        }

        .overlay-menu-list {
            font-family: 'Montserrat', sans-serif;
            list-style: none !important;
            padding: 0 !important;
            margin: 0 !important;
            text-align: center !important;
            z-index: 10 !important;
            position: relative !important;
        }

        .overlay-menu-list li {
            margin: 25px 0 !important;
            transform: translateY(30px) !important;
            opacity: 0 !important;
            transition: all 0.5s ease !important;
        }

        #so-overlay-menu.active .overlay-menu-list li {
            transform: translateY(0) !important;
            opacity: 1 !important;
        }

        #so-overlay-menu.active .overlay-menu-list li:nth-child(1) {
            transition-delay: 0.1s !important;
        }

        #so-overlay-menu.active .overlay-menu-list li:nth-child(2) {
            transition-delay: 0.2s !important;
        }

        #so-overlay-menu.active .overlay-menu-list li:nth-child(3) {
            transition-delay: 0.3s !important;
        }

        .overlay-menu-list a {
            font-size: clamp(32px, 5vw, 50px) !important;
            font-weight: 900 !important;
            color: #fff !important;
            text-decoration: none !important;
            display: block !important;
            letter-spacing: -1px !important;
            transition: 0.3s !important;
            text-transform: uppercase !important;
        }

        .overlay-menu-list a:hover {
            color: var(--neon-color) !important;
        }

        /* ==================== 10. Footer ==================== */
        footer {
            padding: 60px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid var(--line-color);
            background: #000;
            color: #fff;
            position: relative;
            z-index: 10;
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            margin-right: calc(-50vw + 50%);
        }

        .footer-content {
            width: 100%;
            max-width: 1400px;
            padding: 0 5vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-row {
            font-size: 13px !important;
            margin-bottom: 10px !important;
            font-weight: 500;
        }

        .footer-divider {
            margin: 0 15px !important;
            color: rgba(255, 255, 255, 0.3) !important;
        }

        .footer-copyright {
            font-size: 11px;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .footer-divider {
                display: none;
            }

            .footer-row {
                display: flex;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }

        /* Portfolio Filter Tabs */
        .pf-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 4rem;
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 1rem;
        }

        .pf-tab {
            color: #888;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 1px;
            padding-bottom: 12px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            background: transparent;
        }

        .pf-tab.active {
            color: var(--neon-color);
            border-bottom-color: var(--neon-color);
        }

        .pf-tab:hover {
            color: #fff;
        }

        /* Portfolio Grid Cards */
        .pf-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--line-color);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.4s ease, border-color 0.4s ease;
            display: flex;
            flex-direction: column;
            will-change: transform, opacity;
        }

        .pf-card:hover {
            transform: translateY(-8px);
            border-color: var(--neon-color);
        }

        .pf-img-wrap {
            aspect-ratio: 4 / 3;
            overflow: hidden;
            position: relative;
            background: #111;
        }

        .pf-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            filter: grayscale(100%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
        }

        /* Detail View Images - No Grayscale */
        #detail-view img {
            filter: grayscale(0%) !important;
        }

        .pf-card:hover .pf-img {
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        .pf-overlay {
            position: absolute;
            inset: 0;
            background: rgba(204, 255, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .pf-card:hover .pf-overlay {
            opacity: 1;
        }

        .pf-view-btn {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: #000;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .pf-card:hover .pf-view-btn {
            transform: translateY(0);
        }

        .pf-badges {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
            z-index: 2;
        }

        .pf-badge {
            background: var(--neon-color);
            color: #000;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .pf-badge-secondary {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            backdrop-filter: blur(4px);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }

        /* Detail View Styles */
        #detail-view {
            display: none;
            opacity: 0;
        }

        .detail-hero {
            position: relative;
            width: 100vw;
            height: 85vh;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .detail-hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
        }

        .detail-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-dark) 0%, rgba(8, 8, 8, 0.4) 50%, rgba(8, 8, 8, 0.1) 100%);
        }

        .detail-hero-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5vw 80px 5vw;
        }

        .back-btn {
            position: fixed;
            top: 100px;
            left: 5vw;
            z-index: 900;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--line-color);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 12px 24px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--neon-color);
            color: #000;
            border-color: var(--neon-color);
        }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>

<body>

    <script>
        // Custom Cursor Logic
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
        });

        // GNB Scroll bg
        window.addEventListener('scroll', () => {
            const gnb = document.getElementById('gnb');
            if (gnb) {
                if (window.scrollY > 50) gnb.classList.add('scrolled');
                else gnb.classList.remove('scrolled');
            }
        }, { passive: true });

        // Full Screen Menu Logic
        const menuOpen = document.getElementById('menu-open');
        const overlayMenu = document.getElementById('so-overlay-menu');

        if (menuOpen && overlayMenu) {
            menuOpen.addEventListener('click', (e) => {
                e.preventDefault();
                const isActive = overlayMenu.classList.contains('active');
                if (!isActive) {
                    overlayMenu.classList.add('active');
                    menuOpen.classList.add('is-active');
                    document.body.style.overflow = 'hidden';
                    document.body.classList.add('is-menu-open');
                } else {
                    overlayMenu.classList.remove('active');
                    menuOpen.classList.remove('is-active');
                    document.body.style.overflow = '';
                    document.body.classList.remove('is-menu-open');
                }
            });
        }

        function attachCursorEvents() {
            document.querySelectorAll('a, button, .hover-target, .pf-card').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.style.transform += ' scale(2.5)');
                el.addEventListener('mouseleave', () => cursor.style.transform = cursor.style.transform.replace(' scale(2.5)', ''));
            });
        }
        attachCursorEvents();

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDJeGRV5CnRoRwqoQ1igrjhHCJHCMow3L4",
            authDomain: "sketchoo-2c343.firebaseapp.com",
            projectId: "sketchoo-2c343",
            storageBucket: "sketchoo-2c343.firebasestorage.app",
            messagingSenderId: "1072809023897",
            appId: "1:1072809023897:web:edc12722ad0d03b4a45b08"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Portfolio Data
        let projects = [];

        // Fetch data from Firebase
        async function fetchPortfolios() {
            try {
                const snapshot = await db.collection("portfolios").orderBy("createdAt", "desc").get();
                projects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderList();
            } catch (error) {
                console.error("Error fetching portfolios: ", error);
            }
        }

        const grid = document.getElementById('portfolio-grid');

        // Render List
        function renderList(filter = 'all') {
            grid.innerHTML = '';

            if (projects.length === 0) {
                grid.innerHTML = '<p class="text-white text-center w-full col-span-1 md:col-span-2 lg:col-span-3 py-20">등록된 포트폴리오가 없습니다.</p>';
                return;
            }

            projects.forEach((p, idx) => {
                const tags = p.tags || [];
                if (filter === 'all' || tags.includes(filter)) {

                    const hasRenewal = tags.includes('renewal');

                    const card = document.createElement('div');
                    card.className = 'pf-card opacity-0 translate-y-8 hover-target';
                    card.onclick = () => showDetail(p.id);

                    card.innerHTML = `
                        <div class="pf-img-wrap">
                            <img src="${p.thumb}" class="pf-img" alt="${p.title}">
                            <div class="pf-overlay">
                                <span class="pf-view-btn">VIEW</span>
                            </div>
                            <div class="pf-badges">
                                ${hasRenewal ? '<span class="pf-badge">RENEWAL</span>' : ''}
                                <span class="pf-badge-secondary">${p.duration}</span>
                            </div>
                        </div>
                        <div class="p-8 pb-10">
                            <div class="font-mont text-[11px] font-bold text-[#ccff00] mb-3 uppercase tracking-wider">${p.client}</div>
                            <h3 class="text-xl font-bold mb-3 text-white tracking-tight hover:text-[#ccff00] transition-colors">${p.title}</h3>
                            <p class="text-gray-400 text-[15px] font-light leading-relaxed">${p.role}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            // Re-attach cursors
            attachCursorEvents();

            // Intersect Observer / GSAP Anim
            gsap.to('.pf-card', {
                y: 0,
                opacity: 1,
                duration: 0.8,
                stagger: 0.1,
                ease: 'power3.out'
            });
        }

        // Tab events
        document.querySelectorAll('.pf-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.pf-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderList(e.target.dataset.filter);
            });
        });

        // Show Detail
        function showDetail(id) {
            const p = projects.find(x => x.id === id);
            const detailContainer = document.getElementById('detail-content');

            detailContainer.innerHTML = `
                <!-- Section 0: Hero -->
                <div class="detail-hero">
                    <img src="${p.visual}" class="detail-hero-img" alt="${p.title} Hero">
                    <div class="detail-hero-content">
                        <div class="flex flex-wrap gap-3 mb-6">
                            ${(p.tags || []).map(t => `<span class="pf-badge">${t.toUpperCase()}</span>`).join('')}
                            <span class="pf-badge-secondary">${p.duration}</span>
                        </div>
                        <h1 class="font-mont text-[clamp(40px,7vw,110px)] font-black leading-[0.9] text-white uppercase mb-4" style="letter-spacing:-0.05em;">
                            ${p.title}
                        </h1>
                        <p class="text-2xl md:text-3xl text-[#ccff00] font-light">${p.client}</p>
                    </div>
                </div>

                <!-- Section 1: Overview -->
                <div class="py-32 px-[5vw] max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-16">
                    <div class="lg:col-span-5">
                        <h2 class="font-mont text-3xl font-black mb-8 text-[#ccff00]">PROJECT OVERVIEW</h2>
                        <p class="text-xl md:text-2xl text-white font-light leading-relaxed mb-12">
                            ${p.content1}
                        </p>
                        <div class="space-y-4 pt-8 border-t border-white/10">
                            <div>
                                <span class="text-gray-500 font-bold mr-4">CLIENT</span>
                                <span class="text-white">${p.client}</span>
                            </div>
                            <div>
                                <span class="text-gray-500 font-bold mr-4">ROLE</span>
                                <span class="text-white">${p.role}</span>
                            </div>
                            <div>
                                <span class="text-gray-500 font-bold mr-4">DURATION</span>
                                <span class="text-white">${p.duration}</span>
                            </div>
                        </div>
                    </div>
                    <div class="lg:col-span-7">
                        <div class="rounded-3xl overflow-hidden border border-white/10">
                            <img src="${p.img1}" class="w-full" alt="Feature 1">
                        </div>
                        <div class="mt-8 rounded-3xl overflow-hidden border border-white/10">
                            <img src="${p.img2}" class="w-full" alt="Feature 2">
                        </div>
                    </div>
                </div>
            `;

            gsap.to('#list-view', { opacity: 0, display: 'none', duration: 0.4 });
            gsap.to('#detail-view', {
                opacity: 1, display: 'block', duration: 0.4, onComplete: () => {
                    window.scrollTo(0, 0);
                    attachCursorEvents();
                }
            });
        }

        function showList() {
            gsap.to('#detail-view', { opacity: 0, display: 'none', duration: 0.4 });
            gsap.to('#list-view', {
                opacity: 1, display: 'block', duration: 0.4, onComplete: () => {
                    attachCursorEvents();
                }
            });
        }

        // Init
        fetchPortfolios();

        // 🚀 Iframe 자동 높이 조절을 위한 통신 스크립트 추가
        window.addEventListener('load', function() {
            function sendHeight() {
                const height = document.documentElement.scrollHeight || document.body.scrollHeight;
                window.parent.postMessage({ type: 'resize', height: height }, '*');
            }
            
            // 페이지 로드 시 전송
            sendHeight();
            
            // 창 크기 조절 시 다시 전송
            window.addEventListener('resize', sendHeight);
            
            // 데이터 로딩 등으로 내용이 바뀔 때 자동 감지
            const observer = new MutationObserver(sendHeight);
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>
</body>

</html>
