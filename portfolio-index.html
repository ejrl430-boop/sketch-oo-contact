<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKETCH OO - PORTFOLIO</title>

    <!-- Fonts -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (for layout utilities) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#ccff00',
                        bgDark: '#080808',
                        lineColor: 'rgba(255, 255, 255, 0.15)',
                    },
                    fontFamily: {
                        pretendard: ['Pretendard', 'sans-serif'],
                        mont: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js"></script>

    <style>
        :root {
            --neon-color: #ccff00;
            --bg-dark: #080808;
            --line-color: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
            /* Custom cursor */
        }

        body,
        html {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        img {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .font-mont {
            font-family: 'Montserrat', sans-serif !important;
        }

        .font-pretendard {
            font-family: 'Pretendard', sans-serif !important;
        }

        /* Noise Overlay for Texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.05;
            z-index: 9999;
            pointer-events: none;
        }

        /* Custom Cursor */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background-color: var(--neon-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 2147483647;
            pointer-events: none;
            mix-blend-mode: difference;
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease;
        }

        body.is-menu-open #custom-cursor {
            mix-blend-mode: normal !important;
            background-color: var(--neon-color) !important;
        }

        .hover-target {
            cursor: pointer;
        }

        /* ==================== 0. GNB ==================== */
        .gnb-header {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 80px !important;
            min-height: 80px !important;
            padding: 0 !important;
            margin: 0 !important;
            box-sizing: border-box !important;
            z-index: 2147483646 !important;
            display: block !important;
            visibility: visible !important;
            transition: background-color 0.3s ease, border-bottom 0.3s ease, backdrop-filter 0.3s ease !important;
            background-color: transparent;
            border-bottom: 1px solid transparent;
        }

        .gnb-header.scrolled {
            background: rgba(8, 8, 8, 0.95) !important;
            backdrop-filter: blur(15px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .gnb-inner {
            position: relative !important;
            width: 100% !important;
            max-width: 1400px !important;
            height: 80px !important;
            margin: 0 auto !important;
            padding: 0 !important;
            box-sizing: border-box !important;
            display: block !important;
        }

        .gnb-logo {
            position: absolute !important;
            left: 5vw !important;
            top: 25px !important;
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(20px, 2.5vw, 24px) !important;
            font-weight: 900 !important;
            color: #fff !important;
            letter-spacing: -1px !important;
            cursor: pointer;
            text-decoration: none !important;
            margin: 0 !important;
            padding: 0 !important;
            line-height: 1 !important;
            display: block !important;
        }

        .gnb-nav {
            position: absolute !important;
            right: 5vw !important;
            top: 15px !important;
            display: block !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .hamburger-btn {
            width: 48px !important;
            height: 48px !important;
            margin: 0 !important;
            padding: 0 !important;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: flex-end !important;
            gap: 8px !important;
            cursor: pointer;
        }

        .hamburger-btn .line {
            background: #fff;
            height: 2px !important;
            transition: all 0.3s ease;
            margin: 0 !important;
            padding: 0 !important;
            display: block !important;
        }

        .hamburger-btn .line:nth-child(1) {
            width: 30px !important;
        }

        .hamburger-btn .line:nth-child(2) {
            width: 20px !important;
        }

        .hamburger-btn:hover .line {
            background: var(--neon-color);
        }

        .hamburger-btn:hover .line:nth-child(2) {
            width: 30px !important;
        }

        .hamburger-btn.is-active .line:nth-child(1) {
            transform: translateY(5px) rotate(45deg);
            width: 30px !important;
            background: var(--neon-color);
        }

        .hamburger-btn.is-active .line:nth-child(2) {
            transform: translateY(-5px) rotate(-45deg);
            width: 30px !important;
            background: var(--neon-color);
        }

        /* 풀스크린 메뉴 */
        #so-overlay-menu {
            position: fixed !important;
            top: -150vh !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background: rgba(8, 8, 8, 0.98) !important;
            z-index: 2147483000 !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
            transition: opacity 0.4s ease, visibility 0.4s ease, top 0s 0.4s !important;
        }

        #so-overlay-menu.active {
            top: 0 !important;
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
            transition: opacity 0.4s ease, visibility 0.4s ease, top 0s 0s !important;
        }

        .overlay-bg-text {
            font-family: 'Montserrat', sans-serif;
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            font-size: clamp(80px, 15vw, 250px) !important;
            font-weight: 900 !important;
            color: transparent !important;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.05) !important;
            z-index: 1 !important;
            pointer-events: none !important;
            letter-spacing: -0.05em !important;
            text-transform: uppercase !important;
        }

        .overlay-menu-list {
            font-family: 'Montserrat', sans-serif;
            list-style: none !important;
            padding: 0 !important;
            margin: 0 !important;
            text-align: center !important;
            z-index: 10 !important;
            position: relative !important;
        }

        .overlay-menu-list li {
            margin: 25px 0 !important;
            transform: translateY(30px) !important;
            opacity: 0 !important;
            transition: all 0.5s ease !important;
        }

        #so-overlay-menu.active .overlay-menu-list li {
            transform: translateY(0) !important;
            opacity: 1 !important;
        }

        #so-overlay-menu.active .overlay-menu-list li:nth-child(1) {
            transition-delay: 0.1s !important;
        }

        #so-overlay-menu.active .overlay-menu-list li:nth-child(2) {
            transition-delay: 0.2s !important;
        }

        #so-overlay-menu.active .overlay-menu-list li:nth-child(3) {
            transition-delay: 0.3s !important;
        }

        .overlay-menu-list a {
            font-size: clamp(32px, 5vw, 50px) !important;
            font-weight: 900 !important;
            color: #fff !important;
            text-decoration: none !important;
            display: block !important;
            letter-spacing: -1px !important;
            transition: 0.3s !important;
            text-transform: uppercase !important;
        }

        .overlay-menu-list a:hover {
            color: var(--neon-color) !important;
        }

        /* ==================== 10. Footer ==================== */
        footer {
            padding: 60px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid var(--line-color);
            background: #000;
            color: #fff;
            position: relative;
            z-index: 10;
            width: 100vw;
            margin-left: calc(-50vw + 50%);
            margin-right: calc(-50vw + 50%);
        }

        .footer-content {
            width: 100%;
            max-width: 1400px;
            padding: 0 5vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-row {
            font-size: 13px !important;
            margin-bottom: 10px !important;
            font-weight: 500;
        }

        .footer-divider {
            margin: 0 15px !important;
            color: rgba(255, 255, 255, 0.3) !important;
        }

        .footer-copyright {
            font-size: 11px;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .footer-divider {
                display: none;
            }

            .footer-row {
                display: flex;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }

        /* Portfolio Filter Tabs */
        .pf-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 4rem;
            border-bottom: 1px solid var(--line-color);
            padding-bottom: 1rem;
        }

        .pf-tab {
            color: #888;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 1px;
            padding-bottom: 12px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            background: transparent;
        }

        .pf-tab.active {
            color: var(--neon-color);
            border-bottom-color: var(--neon-color);
        }

        .pf-tab:hover {
            color: #fff;
        }

        /* Portfolio Grid Cards */
        .pf-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--line-color);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.4s ease, border-color 0.4s ease;
            display: flex;
            flex-direction: column;
            will-change: transform, opacity;
        }

        .pf-card:hover {
            transform: translateY(-8px);
            border-color: var(--neon-color);
        }

        .pf-img-wrap {
            aspect-ratio: 4 / 3;
            overflow: hidden;
            position: relative;
            background: #111;
        }

        .pf-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .pf-card:hover .pf-img {
            transform: scale(1.05);
        }

        .pf-overlay {
            position: absolute;
            inset: 0;
            background: rgba(204, 255, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .pf-card:hover .pf-overlay {
            opacity: 1;
        }

        .pf-view-btn {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: #000;
            transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .pf-card:hover .pf-view-btn {
            transform: translateY(0);
        }

        .pf-badges {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
            z-index: 2;
        }

        .pf-badge {
            background: var(--neon-color);
            color: #000;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .pf-badge-secondary {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            backdrop-filter: blur(4px);
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }

        /* Detail View Styles */
        #detail-view {
            display: none;
            opacity: 0;
        }

        .detail-hero {
            position: relative;
            width: 100vw;
            height: 85vh;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .detail-hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
        }

        .detail-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-dark) 0%, rgba(8, 8, 8, 0.4) 50%, rgba(8, 8, 8, 0.1) 100%);
        }

        .detail-hero-content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5vw 80px 5vw;
        }

        .back-btn {
            position: fixed;
            top: 100px;
            left: 5vw;
            z-index: 900;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--line-color);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 12px 24px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--neon-color);
            color: #000;
            border-color: var(--neon-color);
        }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
</head>

    <script>
        // Custom Cursor Logic
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
        });

        // GNB Scroll bg
        window.addEventListener('scroll', () => {
            const gnb = document.getElementById('gnb');
            if (gnb) {
                if (window.scrollY > 50) gnb.classList.add('scrolled');
                else gnb.classList.remove('scrolled');
            }
        }, { passive: true });

        // Full Screen Menu Logic
        const menuOpen = document.getElementById('menu-open');
        const overlayMenu = document.getElementById('so-overlay-menu');

        if (menuOpen && overlayMenu) {
            menuOpen.addEventListener('click', (e) => {
                e.preventDefault();
                const isActive = overlayMenu.classList.contains('active');
                if (!isActive) {
                    overlayMenu.classList.add('active');
                    menuOpen.classList.add('is-active');
                    document.body.style.overflow = 'hidden';
                    document.body.classList.add('is-menu-open');
                } else {
                    overlayMenu.classList.remove('active');
                    menuOpen.classList.remove('is-active');
                    document.body.style.overflow = '';
                    document.body.classList.remove('is-menu-open');
                }
            });
        }

        function attachCursorEvents() {
            document.querySelectorAll('a, button, .hover-target, .pf-card').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.style.transform += ' scale(2.5)');
                el.addEventListener('mouseleave', () => cursor.style.transform = cursor.style.transform.replace(' scale(2.5)', ''));
            });
        }
        attachCursorEvents();

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDJeGRV5CnRoRwqoQ1igrjhHCJHCMow3L4",
            authDomain: "sketchoo-2c343.firebaseapp.com",
            projectId: "sketchoo-2c343",
            storageBucket: "sketchoo-2c343.firebasestorage.app",
            messagingSenderId: "1072809023897",
            appId: "1:1072809023897:web:edc12722ad0d03b4a45b08"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Portfolio Data
        let projects = [];

        // Fetch data from Firebase
        async function fetchPortfolios() {
            try {
                const snapshot = await db.collection("portfolios").orderBy("createdAt", "desc").get();
                projects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));



                renderList();
            } catch (error) {
                console.error("Error fetching portfolios: ", error);
            }
        }

        const grid = document.getElementById('portfolio-grid');

        // Render List
        function renderList(filter = 'all') {
            grid.innerHTML = '';

            if (projects.length === 0) {
                grid.innerHTML = '<p class="text-white text-center w-full col-span-1 md:col-span-2 lg:col-span-3 py-20">등록된 포트폴리오가 없습니다.</p>';
                return;
            }

            projects.forEach((p, idx) => {
                const tags = p.tags || [];
                if (filter === 'all' || tags.includes(filter)) {

                    const hasRenewal = tags.includes('renewal');

                    const card = document.createElement('div');
                    card.className = 'pf-card opacity-0 translate-y-8 hover-target';
                    card.onclick = () => showDetail(p.id);

                    card.innerHTML = `
                        <div class="pf-img-wrap">
                            <img src="${p.thumb}" class="pf-img" alt="${p.title}">
                            <div class="pf-overlay">
                                <span class="pf-view-btn">VIEW</span>
                            </div>
                            <div class="pf-badges">
                                ${hasRenewal ? '<span class="pf-badge">RENEWAL</span>' : ''}
                                <span class="pf-badge-secondary">${p.duration}</span>
                            </div>
                        </div>
                        <div class="p-8 pb-10">
                            <div class="font-mont text-[11px] font-bold text-[#ccff00] mb-3 uppercase tracking-wider">${p.client}</div>
                            <h3 class="text-xl font-bold mb-3 text-white tracking-tight hover:text-[#ccff00] transition-colors">${p.title}</h3>
                            <p class="text-gray-400 text-[15px] font-light leading-relaxed">${p.role}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            // Re-attach cursors
            attachCursorEvents();

            // Intersect Observer / GSAP Anim
            gsap.to('.pf-card', {
                y: 0,
                opacity: 1,
                duration: 0.8,
                stagger: 0.1,
                ease: 'power3.out'
            });
        }

        // Tab events
        document.querySelectorAll('.pf-tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.pf-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderList(e.target.dataset.filter);
            });
        });

        // Show Detail
        function showDetail(id) {
            const p = projects.find(x => x.id === id);
            const detailContainer = document.getElementById('detail-content');

            // [DYNAMIC] 제공 서비스 태그 생성
            const servicesHtml = (p.services || "").split(',').filter(s => s.trim() !== "").map(s => `
                <span class="px-4 py-2 bg-[rgba(255,255,255,0.05)] text-gray-400 rounded-full text-xs font-bold border border-[rgba(255,255,255,0.1)] hover:text-neon hover:border-neon transition-all cursor-default">${s.trim()}</span>
            `).join('');

            // [DYNAMIC] 작업 리포트 상세 박스 생성
            const reportItemsHtml = (p.report_items || []).map((item, idx) => {
                return `
                    <div class="bg-[rgba(255,255,255,0.02)] p-8 rounded-[16px] border border-[rgba(255,255,255,0.05)] border-l-[3px] border-l-[#ccff00] hover:bg-[rgba(255,255,255,0.04)] transition-all duration-300">
                        <div class="mb-3">
                            <h4 class="text-white font-bold text-[16px]">${item.title}</h4>
                        </div>
                        <p class="text-gray-400 text-[15px] font-light leading-[1.7]">${item.desc}</p>
                    </div>
                `;
            }).join('');

            detailContainer.innerHTML = `
                <!-- [KEEP] Section 0: Original Dark Hero -->
                <div class="detail-hero">
                    <img src="${p.visual}" class="detail-hero-img" alt="${p.title} Hero">
                    <div class="detail-hero-content">
                        <p class="font-mont text-neon tracking-[4px] text-[12px] font-bold mb-6 uppercase">${p.client}</p>
                        <h1 class="font-pretendard text-[clamp(28px,5vw,60px)] font-black leading-tight mb-6 max-w-[1200px] tracking-tight text-white">${p.title}</h1>
                        <p class="text-lg text-gray-300 font-light max-w-2xl">${p.desc || ''}</p>
                    </div>
                </div>

                <!-- Section 1: Info & Content -->
                <div class="w-full bg-[#080808] py-24 pb-40">
                    <div class="max-w-[1000px] mx-auto px-6">
                        
                        <!-- Info Table -->
                        <div class="border-t border-[rgba(255,255,255,0.1)] mb-12">
                            <div class="flex py-6 border-b border-[rgba(255,255,255,0.05)] items-center">
                                <span class="w-32 md:w-48 text-gray-500 font-medium text-sm md:text-base">제작툴</span>
                                <span class="font-bold text-white text-sm md:text-base">아임웹(Imweb)</span>
                            </div>
                            <div class="flex py-6 border-b border-[rgba(255,255,255,0.05)] items-center">
                                <span class="w-32 md:w-48 text-gray-400 font-medium text-sm md:text-base">작업 기간</span>
                                <span class="font-bold text-white text-sm md:text-base">${p.duration || '-'}</span>
                            </div>
                            <div class="flex py-6 border-b border-[rgba(255,255,255,0.05)] items-center">
                                <span class="w-32 md:w-48 text-gray-400 font-medium text-sm md:text-base">타입</span>
                                <span class="font-bold text-neon text-sm md:text-base uppercase tracking-[2px]">${(p.tags || []).join(' / ')}</span>
                            </div>
                            <div class="flex py-6 border-b border-[rgba(255,255,255,0.05)] items-center">
                                <span class="w-32 md:w-48 text-gray-400 font-medium text-sm md:text-base">클라이언트</span>
                                <span class="font-bold text-white text-sm md:text-base">${p.client || '-'}</span>
                            </div>
                        </div>

                        <!-- Big Link Button -->
                        ${p.link ? `
                        <div class="mb-24">
                            <a href="${p.link}" target="_blank" class="block w-full bg-[#ccff00] text-black text-center py-7 rounded-2xl font-black text-lg md:text-xl hover:bg-white transition-all shadow-[0_10px_40px_rgba(204,255,0,0.2)] group">
                                홈페이지 보러가기
                                <span class="inline-block ml-1 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform">↗</span>
                            </a>
                            <p class="mt-6 text-[12px] text-gray-500 flex items-start gap-2 opacity-60">
                                <span>⚠️</span>
                                <span>클라이언트사에 의해 일부 디자인이 변경되었을 수 있습니다. 원본 디자인은 아래 이미지를 확인해주세요.</span>
                            </p>
                        </div>
                        ` : ''}

                        <!-- [DYNAMIC] Work Report Section -->
                        <div class="mb-32">
                            <h2 class="text-3xl font-black mb-10 pb-4 inline-block text-white">작업 리포트</h2>
                            <div class="text-gray-300 leading-[1.8] text-[16px] md:text-[17px] font-light whitespace-pre-wrap mb-14 break-keep">${(p.content1 || p.desc || '상세 작업 내용이 등록되지 않았습니다.').trim()}</div>
                            
                            <!-- Highlight Boxes (동적 생성) -->
                            <div class="flex flex-col gap-4">
                                ${reportItemsHtml}
                            </div>
                        </div>

                        <!-- [DYNAMIC] Provided Services Section -->
                        ${servicesHtml ? `
                        <div class="mb-32">
                            <h2 class="text-2xl font-black mb-10 pb-4 border-b-2 border-neon inline-block text-white">제공 서비스</h2>
                            <div class="flex flex-wrap gap-2">
                                ${servicesHtml}
                            </div>
                        </div>
                        ` : ''}

                        <!-- Full-width Detail Images (Long Scroll) -->
                        <div class="space-y-16">
                            ${p.img1 ? `<img src="${p.img1}" class="w-full h-auto rounded-[32px] shadow-2xl border border-[rgba(255,255,255,0.05)]" alt="Img 1">` : ''}
                            ${p.img2 && p.img2 !== p.img1 ? `<img src="${p.img2}" class="w-full h-auto rounded-[32px] shadow-2xl border border-[rgba(255,255,255,0.05)]" alt="Img 2">` : ''}
                        </div>

                        <!-- Bottom Grid -->
                        <div class="mt-24 grid grid-cols-2 gap-6">
                            <div class="rounded-3xl overflow-hidden shadow-2xl border border-[rgba(255,255,255,0.05)]">
                                <img src="${p.thumb}" class="w-full h-auto" alt="Thumb">
                            </div>
                            <div class="rounded-3xl overflow-hidden shadow-2xl border border-[rgba(255,255,255,0.05)]">
                                <img src="${p.visual}" class="w-full h-auto" alt="Visual">
                            </div>
                        </div>

                        <!-- Back Button -->
                        <div class="mt-40 text-center">
                            <button onclick="showList()" class="px-10 py-4 border border-[rgba(255,255,255,0.15)] rounded-full font-bold text-gray-400 hover:text-neon hover:border-neon transition-all uppercase text-[12px] tracking-[4px]">
                                ← Back to Portfolio
                            </button>
                        </div>
                    </div>
                </div>
            `;

            // 🚀 해시 기반 히스토리 관리 (뒤로가기 지원)
            location.hash = `detail-${id}`;

            // Scroll to top quickly
            gsap.to(window, { scrollTo: 0, duration: 0.1 });

            // Swap Views
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';

            // Attach cursor to back button
            attachCursorEvents();

            // Reveal Anim
            gsap.fromTo('#detail-view',
                { opacity: 0, y: 50 },
                { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' }
            );
            
            // 🚀 높이 재계산 트리거 (내용 변경 시)
            if(window.sendHeight) window.sendHeight();
        }

        // Show List
        function showList(isHashChange = false) {
            // 히스토리 관리: 직접 목록 버튼을 눌렀을 때만 해시 제거
            if (!isHashChange && location.hash.includes('detail-')) {
                location.hash = ''; 
                return;
            }

            gsap.to('#detail-view', {
                opacity: 0,
                y: 50,
                duration: 0.4,
                onComplete: () => {
                    document.getElementById('detail-view').style.display = 'none';
                    document.getElementById('list-view').style.display = 'block';

                    gsap.to(window, { scrollTo: 0, duration: 0.1 });
                    renderList(document.querySelector('.pf-tab.active').dataset.filter);
                }
            });
        }

        // 🚀 해시 변경(뒤로가기/앞으로가기) 감지 로직
        window.addEventListener('hashchange', function() {
            const hash = location.hash;
            if (hash.startsWith('#detail-')) {
                const id = hash.replace('#detail-', '');
                // 현재 상세뷰가 아니거나 다른 아이디일 때만 실행
                if (document.getElementById('detail-view').style.display !== 'block') {
                    showDetail(id);
                }
            } else {
                // 해시가 없으면 목록으로
                if (document.getElementById('list-view').style.display !== 'block') {
                    showList(true);
                }
            }
        });

        // Init
        window.addEventListener('DOMContentLoaded', async () => {
            await fetchPortfolios();
            
            // 🚀 초기 로드 시 해시가 있으면 해당 상세페이지로 바로 이동 (딥링크 지원)
            const hash = location.hash;
            if (hash.startsWith('#detail-')) {
                const id = hash.replace('#detail-', '');
                showDetail(id);
            }
        });

        // 🚀 Iframe 자동 높이 조절을 위한 통신 스크립트 추가
        function sendHeight() {
            const height = Math.max(
                document.body.scrollHeight, 
                document.documentElement.scrollHeight,
                document.body.offsetHeight, 
                document.documentElement.offsetHeight
            );
            window.parent.postMessage({ type: 'resize', height: height }, '*');
        }
        
        window.sendHeight = sendHeight;

        window.addEventListener('load', function() {
            sendHeight();
            setTimeout(sendHeight, 500);
            setTimeout(sendHeight, 1500);
            setTimeout(sendHeight, 3000);
            window.addEventListener('resize', sendHeight);
            const observer = new MutationObserver(sendHeight);
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>
</body>

</html>
